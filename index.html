<style>

body{
    margin:0;
    min-height:100vh;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    overflow-x:hidden;
    font-family:Arial, Helvetica, sans-serif;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0, 0, 0, 0.212);
    z-index:-1;
}

#video-fondo{
    position:fixed;
    inset:0;

    width:100%;
    height:100%;

    object-fit:cover;
    z-index:-2;
}


.avatar{
    position:relative;
    width:210px;
    margin:0 auto;
}

.avatar img{
    width:200px;
    height:200px;
    border-radius:50%;
    display:block;
    margin:auto;

    border:5px solid rgb(255,230,0);

    transition:.3s;
    box-shadow:0 0 30px rgba(255,230,0,.45);
}

.avatar img:hover{
    transform:scale(1.05);
    box-shadow:0 0 50px rgba(255,230,0,.8);
}

.online{
    position:absolute;
    bottom:12px;
    right:12px;

    width:28px;
    height:28px;

    background:#43b581;
    border-radius:50%;
    border:5px solid #1b1b1b;

    animation:pulse 2s infinite;
}

@keyframes pulse{
    0%{
        box-shadow:0 0 0 0 rgba(67,181,129,.8);
    }
    70%{
        box-shadow:0 0 0 12px rgba(67,181,129,0);
    }
    100%{
        box-shadow:0 0 0 0 rgba(67,181,129,0);
    }
}


.card-1{
    animation:aparecer .8s ease;
}

.card-1 h1{
    text-align:center;
    color:white;
    font-size:2em;

    margin:20px auto 0;

    background:rgba(201,171,2,.8);
    padding:8px 15px;

    width:fit-content;

    border-radius:10px;
}

.card-2{
    background:rgba(201,171,2,.78);

    color:white;

    padding:20px;

    margin:25px auto;

    max-width:350px;

    border-radius:10px;

    text-align:center;

    font-size:21px;

    font-family:"Geist Pixel", sans-serif;
}

.btn{
    margin-top:10px;
    padding:15px 35px;

    background:#c9ab02;
    color:white;

    border-radius:12px;
    text-decoration:none;
    font-weight:bold;

    transition:.3s;
}

.btn:hover{
    transform:scale(1.05);
    box-shadow:0 0 25px gold;
}

.socials{
    display:flex;
    justify-content:center;
    gap:25px;
    margin-top:30px;
}

.socials a{
    width:65px;
    height:65px;

    display:flex;
    align-items:center;
    justify-content:center;

    background:rgba(255,255,255,.08);

    border:2px solid rgba(255,255,255,.15);

    border-radius:15px;

    color:rgb(216,184,3);

    text-decoration:none;

    font-size:32px;

    transition:.25s;

    backdrop-filter:blur(10px);
}

.socials a:hover{
    transform:translateY(-6px) scale(1.08);

    background:rgb(201,171,2);

    color:black;

    border-color:rgb(255,230,0);

    box-shadow:0 0 20px rgba(255,230,0,.4);
}

@keyframes aparecer{
    from{
        opacity:0;
        transform:translateY(40px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>
